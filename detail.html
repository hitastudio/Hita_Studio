        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const gameId = urlParams.get('id');

            if(gameId && gameDB[gameId]) {
                const data = gameDB[gameId];
                
                document.title = data.title + " | Hita Studio";
                document.getElementById('game-title').innerHTML = data.title;
                document.getElementById('game-category').innerHTML = data.category;
                document.getElementById('game-icon').src = data.icon;
                document.getElementById('game-desc').innerHTML = data.desc;

                const btnsContainer = document.getElementById('action-buttons');
                data.links.forEach(linkObj => {
                    btnsContainer.innerHTML += `
                        <a href="${linkObj.url}" class="btn-play-huge" target="_blank" rel="noopener noreferrer">
                            ${linkObj.text}
                        </a>
                    `;
                });


                if(data.videoID) {
                    document.getElementById('game-video').src = "https://www.youtube.com/embed/" + data.videoID;
                    document.getElementById('game-video').style.display = 'block';
                    document.getElementById('game-image-fallback').style.display = 'none';
                    document.getElementById('main-media-display').style.display = 'block';
                } else if (data.gallery && data.gallery.length > 0) {
                    document.getElementById('game-video').style.display = 'none';
                    document.getElementById('game-image-fallback').src = data.gallery[0];
                    document.getElementById('game-image-fallback').style.display = 'block';
                    document.getElementById('main-media-display').style.display = 'block';
                } else {
                    document.getElementById('main-media-display').style.display = 'none';
                }

                const galleryContainer = document.getElementById('game-gallery');
                                
                data.gallery.forEach((imgUrl, index) => {
                    if(index > 0) {
                        galleryContainer.innerHTML += `<img src="${imgUrl}" alt="Screenshot">`;
                    }
                });

                const slider = document.querySelector('.drag-scroll');
                let isDown = false;
                let startX;
                let scrollLeft;

                slider.addEventListener('mousedown', (e) => {
                    isDown = true;
                    slider.classList.add('active');
                    startX = e.pageX - slider.offsetLeft;
                    scrollLeft = slider.scrollLeft;
                });
                slider.addEventListener('mouseleave', () => {
                    isDown = false;
                    slider.classList.remove('active');
                });
                slider.addEventListener('mouseup', () => {
                    isDown = false;
                    slider.classList.remove('active');
                });
                slider.addEventListener('mousemove', (e) => {
                    if(!isDown) return;
                    e.preventDefault();
                    const x = e.pageX - slider.offsetLeft;
                    const walk = (x - startX) * 2;
                    slider.scrollLeft = scrollLeft - walk;
                });

            } else {
                document.getElementById('game-title').innerHTML = "Game Tidak Ditemukan!";
                document.getElementById('game-desc').innerHTML = "Sepertinya game yang kamu cari belum dirilis atau salah link.";
                document.querySelector('.media-container').style.display = 'none';
            }
        });
